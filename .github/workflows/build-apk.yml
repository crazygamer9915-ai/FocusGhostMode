name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-34" "build-tools;34.0.0"
      - run: chmod +x FocusGhostMode/gradlew
      - run: cd FocusGhostMode && gradle wrapper --gradle-version=8.6
      - run: cd FocusGhostMode && ./gradlew assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: FocusGhostMode-APK
          path: FocusGhostMode/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
